<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
  <meta name="theme-color" content="#E63946" />
  <meta name="description" content="Mundo do Circo - Descubra os melhores espetaculos de circo perto de voce" />
  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mundo do Circo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Mundo do Circo</title>
  <!-- Leaflet CSS (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/Icon-iOS-Default-64x64@3x.png" />
  <style id="expo-reset">
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family:
        system-ui,
        -apple-system,
        sans-serif;
      background-color: #FFF8F0;
    }

    #root {
      display: flex;
      height: 100%;
      flex: 1;
    }

    @supports (padding: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* Web Splash Screen */
    #web-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFF8F0;
      transition: opacity 0.3s ease-out;
    }

    #web-splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    #web-splash .logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      animation: pulse 1.5s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #web-splash .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>

<body>
  <noscript>Voce precisa habilitar JavaScript para usar este app.</noscript>
  <!-- Web Splash Screen -->
  <div id="web-splash">
    <div class="logo">
      <img src="/images/logo.png" alt="Mundo do Circo" />
    </div>
  </div>
  <div id="root"></div>
  <script>
    // ── Splash safety timeout ──
    (function () {
      var SPLASH_TIMEOUT = 8000;
      var timer = setTimeout(function () {
        var splash = document.getElementById('web-splash');
        if (splash) {
          console.warn('[Splash] Timeout reached, forcing hide');
          splash.classList.add('hide');
          setTimeout(function () { splash.remove(); }, 300);
        }
      }, SPLASH_TIMEOUT);
      window.__clearSplashTimer = function () { clearTimeout(timer); };
    })();

    // ── Service Worker Registration ──
    (function () {
      if (!('serviceWorker' in navigator)) return;

      var isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      // Dev: unregister any existing SW
      if (isDev) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            r.unregister();
            console.log('[PWA] Dev: unregistered SW', r.scope);
          });
        });
        return;
      }

      // Prod: full registration with update lifecycle
      var refreshing = false;

      // When new SW takes control, reload to get fresh assets
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!refreshing) {
          refreshing = true;
          console.log('[PWA] New SW active, reloading...');
          window.location.reload();
        }
      });

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          console.log('[PWA] SW registered:', reg.scope);

          // New SW already waiting (e.g. user revisited after deploy)
          if (reg.waiting) {
            window.__swWaiting = reg.waiting;
            notifyUpdate();
          }

          // New SW found during this session
          reg.addEventListener('updatefound', function () {
            var newWorker = reg.installing;
            if (!newWorker) return;

            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version ready — let client decide when to activate
                window.__swWaiting = newWorker;
                notifyUpdate();
              }
            });
          });

          // Periodic update check — SPAs may stay open for days
          var UPDATE_INTERVAL = 60 * 60 * 1000; // 1 hour
          setInterval(function () {
            if (reg.installing) return;
            if (!navigator.onLine) return;
            fetch('/sw.js', { cache: 'no-store' }).then(function (resp) {
              if (resp.ok) reg.update();
            }).catch(function () { });
          }, UPDATE_INTERVAL);

        }).catch(function (err) {
          console.warn('[PWA] SW registration failed:', err);
        });
      });

      function notifyUpdate() {
        // Dispatch custom event — the React app listens for this
        window.dispatchEvent(new CustomEvent('sw-update-available'));
      }

      // Called by React app when user accepts the update
      window.__activateNewSW = function () {
        if (window.__swWaiting) {
          window.__swWaiting.postMessage({ type: 'SKIP_WAITING' });
        }
      };
    })();
  </script>
</body>

</html>
